<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circlesGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <linearGradient id="circlesGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
    <filter id="circlesGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- 大圆 -->
  <circle cx="75" cy="75" r="40" fill="none" stroke="url(#circlesGradient1)" stroke-width="3" opacity="0.8" />
  <circle cx="75" cy="75" r="30" fill="none" stroke="url(#circlesGradient1)" stroke-width="2" opacity="0.6" />
  <circle cx="75" cy="75" r="20" fill="url(#circlesGradient1)" opacity="0.2" />
  
  <!-- 装饰小圆 -->
  <circle cx="45" cy="45" r="15" fill="none" stroke="url(#circlesGradient2)" stroke-width="2" opacity="0.7" />
  <circle cx="45" cy="45" r="10" fill="url(#circlesGradient2)" opacity="0.3" />
  
  <circle cx="105" cy="45" r="12" fill="none" stroke="url(#circlesGradient2)" stroke-width="2" opacity="0.6" />
  <circle cx="105" cy="45" r="8" fill="url(#circlesGradient2)" opacity="0.25" />
  
  <circle cx="45" cy="105" r="10" fill="none" stroke="url(#circlesGradient2)" stroke-width="1.5" opacity="0.6" />
  <circle cx="45" cy="105" r="6" fill="url(#circlesGradient2)" opacity="0.2" />
  
  <circle cx="105" cy="105" r="13" fill="none" stroke="url(#circlesGradient2)" stroke-width="2" opacity="0.7" />
  <circle cx="105" cy="105" r="9" fill="url(#circlesGradient2)" opacity="0.25" />
  
  <!-- 中心点缀 -->
  <circle cx="75" cy="75" r="4" fill="white" opacity="0.8" />
  
  <!-- 连接线 -->
  <line x1="75" y1="75" x2="45" y2="45" stroke="#a78bfa" stroke-width="1" opacity="0.4" />
  <line x1="75" y1="75" x2="105" y2="45" stroke="#a78bfa" stroke-width="1" opacity="0.4" />
  <line x1="75" y1="75" x2="45" y2="105" stroke="#a78bfa" stroke-width="1" opacity="0.4" />
  <line x1="75" y1="75" x2="105" y2="105" stroke="#a78bfa" stroke-width="1" opacity="0.4" />
</svg>